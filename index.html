<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حصر بيانات المقاولين | Contractors Data</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

        :root {
            --primary-color: #0b4a99;
            --secondary-color: #00b4d8;
            --bg-gradient: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            --border-radius: 16px;
            --input-border: #e2e8f0;
            --input-focus: #3b82f6;
        }

        body {
            font-family: 'Tajawal', Tahoma, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 40px 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 45px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            position: relative;
            border-top: 5px solid var(--primary-color);
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 25px;
            margin-bottom: 35px;
        }

        .logo-container img {
            max-height: 85px;
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        .lang-btn {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(11, 74, 153, 0.2);
        }

        h2.section-title {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 35px;
            font-size: 1.8em;
            font-weight: 800;
        }

        .form-group { margin-bottom: 25px; }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--primary-color);
            font-size: 0.95em;
        }

        input[type="text"], input[type="number"], input[type="tel"],
        input[type="date"], select, input[type="file"] {
            width: 100%; padding: 15px 18px; border: 2px solid var(--input-border);
            border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1em;
            background-color: #f8fafc; transition: all 0.3s ease; color: var(--text-color);
        }
        input[type="date"] { position: relative; }
        input[type="file"] { background-color: #fff; padding: 12px; cursor: pointer; }

        input:focus, select:focus {
            outline: none; border-color: var(--input-focus);
            background-color: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary-color), #1a5cff);
            color: white; border: none; padding: 18px; width: 100%; font-size: 1.2em;
            border-radius: 12px; cursor: pointer; font-weight: 800; font-family: inherit;
            margin-top: 15px; box-shadow: 0 8px 20px rgba(26, 92, 255, 0.25);
            transition: all 0.3s ease;
        }
        .btn-main:hover {
            transform: translateY(-3px); box-shadow: 0 12px 25px rgba(26, 92, 255, 0.35);
        }
        .btn-main:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .success-msg, .error-msg {
            display: none; padding: 18px; border-radius: 12px;
            margin-bottom: 30px; text-align: center; font-weight: 700; font-size: 1.1em;
            word-wrap: break-word;
        }
        .success-msg { background-color: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
        .error-msg { background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

        .progress-container {
            display: none; width: 100%; background-color: #e2e8f0; 
            border-radius: 8px; margin-bottom: 20px; overflow: hidden;
        }
        .progress-bar {
            height: 8px; background-color: #3b82f6; width: 0%;
            transition: width 0.4s ease;
        }

        @media (min-width: 650px) {
            .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
            .form-grid .form-group { margin-bottom: 0; }
            .full-width { grid-column: 1 / -1; }
        }
    </style>
</head>

    <div class="success-msg" id="successMsg">تم إرسال البيانات بنجاح إلى النظام.</div>
    <div class="error-msg" id="errorMsg">حدث خطأ أثناء الإرسال. يرجى المحاولة لاحقاً.</div>

    </div>

    <h2 class="section-title" id="formTitle">حصر بيانات الموظفين المقاولين</h2>

    <form id="employeeForm">
        <div class="form-grid">
            <div class="form-group full-width">
                <label id="lbl_name">الاسم</label>
                <input type="text" id="emp_name" name="name" required>
            </div>

            <div class="form-group">
                <label id="lbl_id">رقم الهوية / رقم الاقامة</label>
                <input type="number" id="emp_id" name="id" required>
            </div>

            <div class="form-group">
                <label id="lbl_mobile">رقم الجوال</label>
                <input type="tel" id="emp_mobile" name="mobile" required>
            </div>

            <div class="form-group">
                <label id="lbl_dob">تاريخ الميلاد</label>
                <input type="date" id="emp_dob" name="dob" lang="ar" onchange="calculateAge()" required>
            </div>

            <div class="form-group">
                <label id="lbl_age">العمر</label>
                <input type="number" id="emp_age" name="age" readonly placeholder="يُحسب تلقائياً" style="background-color: #f1f5f9; border-color:#e2e8f0; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label id="lbl_gender">الجنس</label>
                <select id="emp_gender" name="gender" required>
                    <option value="" disabled selected id="opt_choose_1">اختر...</option>
                    <option value="Male" id="opt_male">ذكر</option>
                    <option value="Female" id="opt_female">أنثى</option>
                </select>
            </div>

            <!-- الحقول الجديدة -->
            <div class="form-group">
                <label id="lbl_department">الإدارة</label>
                <select id="emp_department" name="department" required>
                    <option value="" disabled selected id="opt_choose_4">اختر...</option>
                    <option value="Technical Support Department" id="opt_dept_tsd">إدارة المساندة الفنية</option>
                    <option value="Maintenance Department" id="opt_dept_maint">إدارة الصيانة</option>
                    <option value="Operations Department" id="opt_dept_ops">إدارة التشغيل</option>
                    <option value="HSE" id="opt_dept_hse">دائرة الصحة المهنية والسلامة والبيئة</option>
                </select>
            </div>

            <div class="form-group">
                <label id="lbl_section">الدائرة/ المجموعة/ القسم</label>
                <input type="text" id="emp_section" name="section" required>
            </div>
            <!-- نهاية الحقول الجديدة -->

            <div class="form-group">
                <label id="lbl_contractor">المقاول</label>
                <select id="emp_contractor" name="contractor" required>
                    <option value="" disabled selected id="opt_choose_2">اختر...</option>
                    <option value="TAAQA" id="opt_taqa">طاقة</option>
                    <option value="Exact" id="opt_etqan">اتقان الحلول</option>
                    <option value="GSSC" id="opt_ghulam">غلام شبير</option>
                    <option value="Al-Majal" id="opt_majal">المجال</option>
                </select>
            </div>

            <div class="form-group">
                <label id="lbl_qualification">المؤهل</label>
                <select id="emp_qualification" name="qualification" required>
                    <option value="" disabled selected id="opt_choose_3">اختر...</option>
                    <option value="Primary" id="opt_primary">ابتدائي</option>
                    <option value="Intermediate" id="opt_intermediate">متوسط</option>
                    <option value="Secondary" id="opt_secondary">ثانوي</option>
                    <option value="Bachelor" id="opt_bachelor">بكالوريوس</option>
                    <option value="Master" id="opt_master">ماجستير</option>
                    <option value="PhD" id="opt_phd">دكتوراه</option>
                </select>
            </div>

            <div class="form-group">
                <label id="lbl_specialization">التخصص</label>
                <input type="text" id="emp_specialization" name="specialization" required>
            </div>

            <div class="form-group">
                <label id="lbl_qual_date">تاريخ الحصول على المؤهل</label>
                <input type="date" id="emp_qual_date" name="qual_date" lang="ar" required>
            </div>

            <div class="form-group full-width">
                <label id="lbl_qual_file">إرفاق المؤهل (PDF أو صورة)</label>
                <input type="file" id="emp_qual_file" accept=".pdf, image/*" required>
                <small id="lbl_file_desc" style="color: #64748b; font-size: 0.85em; display: block; margin-top: 5px;">الحد الأقصى لحجم الملف: 5 ميجابايت (يُفضل تصوير المستند بدقة متوسطة)</small>
            </div>

            <div class="form-group">
                <label id="lbl_job_title">المسمى الوظيفي حسب عقد العمل</label>
                <input type="text" id="emp_job_title" name="job_title" required>
            </div>

            <div class="form-group">
                <label id="lbl_join_date">تاريخ الالتحاق بالعمل بالمحطة</label>
                <input type="date" id="emp_join_date" name="join_date" lang="ar" required>
            </div>

            <div class="form-group full-width">
                <label id="lbl_end_date">تاريخ نهاية العقد</label>
                <input type="date" id="emp_end_date" name="end_date" lang="ar" required>
            </div>
        </div>

        <button type="submit" class="btn-main" id="btn_submit">إرسال البيانات والمرفقات</button>
    </form>
</div>

                     'btn_submit'];

        ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = t[id]; });

        document.getElementById('emp_age').placeholder = t.age_placeholder;
        document.getElementById('opt_choose_1').innerText = t.choose;
        document.getElementById('opt_choose_2').innerText = t.choose;
        document.getElementById('opt_choose_3').innerText = t.choose;
        document.getElementById('opt_choose_4').innerText = t.choose;

        const dateInputs = document.querySelectorAll('input[type="date"]');
        dateInputs.forEach(input => { input.lang = currentLang === 'ar' ? 'ar' : 'en-GB'; });
    }

    function calculateAge() {
        const dobInput = document.getElementById('emp_dob').value;
        if (dobInput) {
            const dob = new Date(dobInput);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const m = today.getMonth() - dob.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) { age--; }
            document.getElementById('emp_age').value = age;
        }
    }

    document.getElementById('employeeForm').addEventListener('submit', function(e) {
        e.preventDefault();

        if (SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL') {
            alert('يرجى إضافة رابط Google Script في الكود أولاً!');
            return;
        }

        const errorMsgDiv = document.getElementById('errorMsg');
        const successMsgDiv = document.getElementById('successMsg');
        errorMsgDiv.style.display = 'none';
        successMsgDiv.style.display = 'none';

        const fileInput = document.getElementById('emp_qual_file');
        const file = fileInput.files[0];

        if (file && file.size > 5 * 1024 * 1024) {
            errorMsgDiv.innerText = currentLang === 'ar' ? 'حجم المرفق كبير جداً! يرجى اختيار ملف أو صورة بحجم أقل من 5 ميجابايت.' : 'File is too large! Max 5MB.';
            errorMsgDiv.style.display = 'block';
            window.scrollTo(0,0);
            return;
        }

        const submitBtn = document.getElementById('btn_submit');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');

        submitBtn.disabled = true;
        submitBtn.innerText = currentLang === 'ar' ? 'جاري رفع البيانات والمرفق...' : 'Uploading...';

        progressContainer.style.display = 'block';
        progressBar.style.width = '20%';

        const reader = new FileReader();
        reader.onload = function() {
            progressBar.style.width = '60%';
            const base64Data = reader.result.split(',')[1];

            const payload = {
                name: document.getElementById('emp_name').value,
                id: document.getElementById('emp_id').value,
                mobile: document.getElementById('emp_mobile').value,
                dob: document.getElementById('emp_dob').value,
                age: document.getElementById('emp_age').value,
                gender: document.getElementById('emp_gender').value,

                // الحقول الجديدة
                department: document.getElementById('emp_department').value,
                section: document.getElementById('emp_section').value,

                contractor: document.getElementById('emp_contractor').value,
                qualification: document.getElementById('emp_qualification').value,
                specialization: document.getElementById('emp_specialization').value,
                qual_date: document.getElementById('emp_qual_date').value,

                qual_file_base64: base64Data,
                qual_file_name: file.name,
                qual_file_mime: file.type,

                job_title: document.getElementById('emp_job_title').value,
                join_date: document.getElementById('emp_join_date').value,
                end_date: document.getElementById('emp_end_date').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                redirect: 'follow', 
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8' 
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.text()) 
            .then(text => {
                progressBar.style.width = '100%';
                setTimeout(() => { progressContainer.style.display = 'none'; progressBar.style.width = '0%'; }, 500);

                try {
                    const data = JSON.parse(text);
                    if (data.result === 'success') {
                        successMsgDiv.innerText = dict[currentLang].successMsg;
                        successMsgDiv.style.display = 'block';
                        document.getElementById('employeeForm').reset();
                        window.scrollTo(0,0);
                        setTimeout(() => {
                            successMsgDiv.style.display = 'none';
                        }, 4000);
                    } else { 
                        throw new Error(data.error || 'Server error'); 
                    }
                } catch(e) {
                    throw new Error('فشل الخادم في الرد: ' + text.substring(0, 100));
                }
            })
            .catch(error => { 
                console.error('Fetch Error:', error);
                progressContainer.style.display = 'none';
                progressBar.style.width = '0%';

                errorMsgDiv.innerText = (currentLang === 'ar' ? 'حدث خطأ: ' : 'Error: ') + error.message;
                errorMsgDiv.style.display = 'block'; 
                window.scrollTo(0,0);
            })
            .finally(() => { 
                submitBtn.disabled = false; 
                submitBtn.innerText = dict[currentLang].btn_submit; 
            });
        };

        reader.onerror = function() {
            progressContainer.style.display = 'none';
            errorMsgDiv.innerText = currentLang === 'ar' ? 'حدث خطأ أثناء قراءة المرفق من الجهاز، يرجى المحاولة مرة أخرى.' : 'Error reading file.';
            errorMsgDiv.style.display = 'block';
            submitBtn.disabled = false; 
            submitBtn.innerText = dict[currentLang].btn_submit; 
            window.scrollTo(0,0);
        };

        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
